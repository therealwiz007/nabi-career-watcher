name: Website Watcher Schedule

on:
  schedule:
    - cron: '0 */6 * * *' # Automated system trigger (Runs every 6 hours)
  workflow_dispatch: # Enables a manual play button inside your dashboard

jobs:
  check-site:
    runs-on: ubuntu-latest
    
    # This block explicitly forces write permissions for the automated runner
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Web Checker Script
      env:
        WAPPFLY_API_KEY: ${{ secrets.WAPPFLY_API_KEY }}
        WAPPFLY_DEVICE_ID: ${{ secrets.WAPPFLY_DEVICE_ID }}
        PHONE_ONE: ${{ secrets.PHONE_ONE }}
        PHONE_TWO: ${{ secrets.PHONE_TWO }}
      run: |
        python watcher.py

    - name: Save Baseline Update to GitHub Repo
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add last_website_text.txt
        git commit -m "Auto-update website tracking baseline" || exit 0
        git push origin main
